<style>
  :root {
    --green: #2d6a4f;
    --green-light: #d8f3dc;
    --green-bg: #f0faf3;
    --orange: #e76f51;
    --gray: #6b7280;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--green-bg);
    color: #1a1a1a;
    line-height: 1.5;
    padding: 1rem;
    max-width: 800px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    padding: 1.5rem 1rem;
    margin-bottom: 1rem;
  }
  header h1 { font-size: 1.6rem; color: var(--green); }
  header p { color: var(--gray); font-size: 0.9rem; margin-top: 0.25rem; }
  .sync-status {
    font-size: 0.75rem;
    color: var(--gray);
    margin-top: 0.25rem;
  }
  .sync-status.connected { color: var(--green); }
  .sync-status.offline { color: var(--orange); }
  .progress-bar {
    background: var(--border);
    border-radius: 999px;
    height: 10px;
    margin: 1rem 0;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--green);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 999px;
  }
  .progress-text {
    text-align: center;
    font-size: 0.85rem;
    color: var(--gray);
  }
  .category {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 0.75rem;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    cursor: pointer;
    user-select: none;
    background: #fff;
  }
  .category-header:hover { background: #fafafa; }
  .category-header h2 {
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .category-header .count {
    font-size: 0.8rem;
    color: var(--gray);
    font-weight: normal;
  }
  .chevron {
    transition: transform 0.2s;
    color: var(--gray);
    font-size: 0.8rem;
  }
  .category.collapsed .chevron { transform: rotate(-90deg); }
  .category.collapsed .category-items { display: none; }
  .category-items { padding: 0 0.5rem 0.5rem; }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.5rem;
    border-radius: 6px;
    min-height: 44px;
  }
  .item:hover { background: #f9fafb; }
  .item input[type="checkbox"] {
    margin-top: 2px;
    width: 22px;
    height: 22px;
    accent-color: var(--green);
    cursor: pointer;
    flex-shrink: 0;
  }
  .item label {
    cursor: pointer;
    flex: 1;
    padding: 2px 0;
  }
  .item.checked label {
    text-decoration: line-through;
    color: var(--gray);
  }
  .item .note {
    font-size: 0.8rem;
    color: var(--gray);
    display: block;
  }
  .tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    vertical-align: middle;
    margin-left: 4px;
  }
  .tag-toddler { background: #dbeafe; color: #1e40af; }
  .tag-baby { background: #fce7f3; color: #9d174d; }
  .tag-hot { background: #fef3c7; color: #92400e; }
  .tag-prep { background: #e0e7ff; color: #3730a3; }

  .actions {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin: 1.5rem 0;
    flex-wrap: wrap;
  }
  .actions button {
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-size: 0.85rem;
    color: #374151;
    min-height: 44px;
  }
  .actions button:hover { background: #f3f4f6; }
  .actions button.danger { color: var(--orange); }
  .actions button.active {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .actions button.share {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .actions button.share:hover { opacity: 0.9; }

  .edit-controls {
    display: none;
    align-items: center;
    gap: 0.25rem;
    margin-left: auto;
    flex-shrink: 0;
  }
  .editing .edit-controls { display: flex; }
  .edit-controls button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 4px 8px;
    border-radius: 4px;
    color: var(--gray);
    line-height: 1;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .edit-controls button:hover { background: #f3f4f6; }
  .edit-controls button.del:hover { color: var(--orange); }

  .add-item {
    display: none;
    padding: 0.4rem 0.5rem;
    gap: 0.5rem;
  }
  .editing .add-item { display: flex; }
  .add-item input {
    flex: 1;
    padding: 0.4rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
    min-height: 44px;

  .add-item button {
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--green);
    background: var(--green);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    min-height: 44px;

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--gray);
  }
</style>

const LIST_ID = location.hash.slice(1) || "henry-coe-2026";
if (!location.hash) history.replaceState(null, "", "#" + LIST_ID);

const LS_STATE = "packing-" + LIST_ID + "-state";
const LS_DATA = "packing-" + LIST_ID + "-data";

let state = {};
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let editMode = false;
let syncReady = false;
let writeTimer = null;
let pollTimer = null;
let lastUpdated = null;

const API_BASE = SUPABASE_URL + "/rest/v1/" + TABLE;
const HEADERS = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": "Bearer " + SUPABASE_ANON_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

function loadLocal() {
  try { state = JSON.parse(localStorage.getItem(LS_STATE)) || {}; } catch { state = {}; }
  try {
    const d = JSON.parse(localStorage.getItem(LS_DATA));
    if (d && d.length) data = d;
  } catch {}
}

function saveLocal() {
  localStorage.setItem(LS_STATE, JSON.stringify(state));
  localStorage.setItem(LS_DATA, JSON.stringify(data));
}

function setSyncStatus(text, cls) {
  const el = document.getElementById("syncStatus");
  el.textContent = text;
  el.className = "sync-status " + (cls || "");
}

async function initSync() {
  try {
    const res = await fetch(API_BASE + "?id=eq." + encodeURIComponent(LIST_ID) + "&select=*", {
      headers: HEADERS
    });
    if (!res.ok) throw new Error("HTTP " + res.status + ": " + (await res.text()));
    const rows = await res.json();

    if (rows.length > 0) {
      const row = rows[0];
      if (row.state && Object.keys(row.state).length) state = row.state;
      if (row.data && row.data.length) data = row.data;
      lastUpdated = row.updated_at;
      saveLocal();
    } else {
      const now = new Date().toISOString();
      const insertRes = await fetch(API_BASE, {
        method: "POST",
        headers: HEADERS,
        body: JSON.stringify({ id: LIST_ID, state: state, data: data, updated_at: now })
      });
      if (!insertRes.ok) throw new Error("Insert failed: " + (await insertRes.text()));
      lastUpdated = now;
    }

    syncReady = true;
    setSyncStatus("Synced", "connected");
    render();
    startPolling();
  } catch (e) {
    console.warn("Sync unavailable:", e);
    setSyncStatus("Offline — " + (e.message || "unknown error"), "offline");
    render();
  }
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(API_BASE + "?id=eq." + encodeURIComponent(LIST_ID) + "&select=*", {
        headers: HEADERS
      });
      if (!res.ok) return;
      const rows = await res.json();
      if (rows.length === 0) return;
      const row = rows[0];
      if (row.updated_at && row.updated_at !== lastUpdated) {
        lastUpdated = row.updated_at;
        if (row.state) state = row.state;
        if (row.data && row.data.length) data = row.data;
        saveLocal();
        render();
      }
    } catch {}
  }, 3000);
}

function pushToRemote() {
  if (!syncReady) return;
  clearTimeout(writeTimer);
  writeTimer = setTimeout(async () => {
    const now = new Date().toISOString();
    lastUpdated = now;
    try {
      await fetch(API_BASE + "?id=eq." + encodeURIComponent(LIST_ID), {
        method: "PATCH",
        headers: HEADERS,
        body: JSON.stringify({ state: state, data: data, updated_at: now })
      });
    } catch (e) {
      console.warn("Sync write failed:", e);
    }
  }, 300);
}

function render() {
  const main = document.getElementById("list");
  main.innerHTML = "";
  let total = 0, checked = 0;

  const tagLabel = { toddler: "3.5y", baby: "15mo", hot: "hot tip", prep: "prep?" };
  const tagClass = { toddler: "tag-toddler", baby: "tag-baby", hot: "tag-hot", prep: "tag-prep" };

  data.forEach((cat, ci) => {
    const collapsed = state["cat_" + ci + "_collapsed"];
    const div = document.createElement("div");
    div.className = "category" + (collapsed ? " collapsed" : "") + (editMode ? " editing" : "");

    let catChecked = 0;
    const itemsHtml = cat.items.map((item, ii) => {
      const key = "item_" + ci + "_" + ii;
      const isChecked = !!state[key];
      if (isChecked) { catChecked++; checked++; }
      total++;
      const tags = (item.tags || []).map(t =>
        '<span class="tag ' + (tagClass[t] || "") + '">' + (tagLabel[t] || t) + '</span>'
      ).join("");
      const note = item.note ? '<span class="note">' + item.note + '</span>' : "";
      const editCtrl = '<span class="edit-controls">' +
        '<button class="del" onclick="deleteItem(' + ci + ',' + ii + ')" title="Delete">&times;</button>' +
        '</span>';
      return '<div class="item ' + (isChecked ? "checked" : "") + '">' +
        '<input type="checkbox" id="' + key + '" ' + (isChecked ? "checked" : "") + ' onchange="toggle(\'' + key + '\')">' +
        '<label for="' + key + '">' + item.name + tags + note + '</label>' +
        editCtrl +
        '</div>';
    }).join("");

    const addRow = '<div class="add-item">' +
      '<input type="text" placeholder="Add item…" onkeydown="if(event.key===\'Enter\')addItem(' + ci + ',this)">' +
      '<button onclick="addItem(' + ci + ',this.previousElementSibling)">Add</button>' +
      '</div>';

    div.innerHTML =
      '<div class="category-header" onclick="toggleCat(' + ci + ')">' +
        '<h2>' + cat.icon + ' ' + cat.cat + ' <span class="count">' + catChecked + '/' + cat.items.length + '</span></h2>' +
        '<span class="chevron">&#9660;</span>' +
      '</div>' +
      '<div class="category-items">' + itemsHtml + addRow + '</div>';
    main.appendChild(div);
  });

  const pct = total ? Math.round(checked / total * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = checked + " / " + total + " packed (" + pct + "%)";
}

function toggle(key) {
  state[key] = !state[key];
  saveLocal();
  pushToRemote();
  render();
}

function toggleCat(ci) {
  const key = "cat_" + ci + "_collapsed";
  state[key] = !state[key];
  saveLocal();
  pushToRemote();
  render();
}

function expandAll() {
  data.forEach((_, ci) => { state["cat_" + ci + "_collapsed"] = false; });
  saveLocal();
  pushToRemote();
  render();
}
function collapseAll() {
  data.forEach((_, ci) => { state["cat_" + ci + "_collapsed"] = true; });
  saveLocal();
  pushToRemote();
  render();
}
function resetAll() {
  if (!confirm("Uncheck all items?")) return;
  const collapsed = {};
  Object.keys(state).forEach(k => { if (k.startsWith("cat_")) collapsed[k] = state[k]; });
  state = collapsed;
  saveLocal();
  pushToRemote();
  render();
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById("editBtn");
  btn.textContent = editMode ? "Done Editing" : "Edit List";
  btn.className = editMode ? "active" : "";
  render();
}

function deleteItem(ci, ii) {
  data[ci].items.splice(ii, 1);
  const newState = {};
  Object.keys(state).forEach(k => {
    if (k.startsWith("cat_")) { newState[k] = state[k]; return; }
    const m = k.match(/^item_(\d+)_(\d+)$/);
    if (!m) return;
    const c = parseInt(m[1]), i = parseInt(m[2]);
    if (c === ci && i === ii) return;
    if (c === ci && i > ii) newState["item_" + c + "_" + (i - 1)] = state[k];
    else newState[k] = state[k];
  });
  state = newState;
  saveLocal();
  pushToRemote();
  render();
}

function addItem(ci, input) {
  const name = input.value.trim();
  if (!name) return;
  data[ci].items.push({ name: name });
  input.value = "";
  saveLocal();
  pushToRemote();
  render();
}

function shareLink() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: "Packing List", url: url });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast("Link copied!"));
  } else {
    showToast(url);
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

loadLocal();
render();
initSync();
</script>
</body>
</html>
